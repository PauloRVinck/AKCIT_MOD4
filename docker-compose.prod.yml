# docker-compose.prod.yml — ambiente de produção
# Uso: docker-compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:16-alpine
    container_name: prime-review-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-primereview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-primereview}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-primereview}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prime-review-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-primereview}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-primereview}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      TMDB_API_KEY: ${TMDB_API_KEY:?TMDB_API_KEY is required}
      TMDB_BASE_URL: https://api.themoviedb.org/3
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
